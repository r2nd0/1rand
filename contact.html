<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="MyStyle.css">

<body>
  <header>
    <h1>My Site</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="product.html">Products</a>
    </nav>
  </header>

  <main>
    <h2>Contact</h2>
    <p>Fill out the form below and we'll get back to you (this form is just a demo and does not actually submit).</p>

    <form>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com">

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>

      <button type="submit">Send</button>
    </form>
  </main>

  <footer>
    <p class="footer-students">Rand Almuflih, Joud Alghadeer, Reema Almuhawis, Sarah Alosaimi</p>
    <p>Web Design</p>

  </footer>

  <script src="Myjs.js"></script>
</body>
</html>
